<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tulpar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:   #090909;
  --bg1:  #101010;
  --bg2:  #161616;
  --bd:   #1e1e1e;
  --t:    #d8d8d8;
  --m:    #4a4a4a;
  --m2:   #666;
  --g:    #34d27b;
  --g2:   #112a1c;
  --r:    #e05252;
  --r2:   #2a1010;
  --y:    #e5b74a;
  --y2:   #2a2010;
  --font: ui-monospace,'Cascadia Code','Consolas','Monaco',monospace;
}

body{
  background:var(--bg);color:var(--t);
  font-family:var(--font);font-size:12px;line-height:1.5;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── Header ─────────────────────────────────────────────── */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 14px;border-bottom:1px solid var(--bd);
  background:var(--bg1);flex-shrink:0;
}
#server-name{color:var(--g);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
#status{color:var(--m2);font-size:10px}

/* ── Main layout ─────────────────────────────────────────── */
main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── Left sidebar ────────────────────────────────────────── */
#left{
  width:176px;min-width:176px;border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;background:var(--bg1);
}
#bot-list{flex:1;overflow-y:auto;padding:6px 0}

.bot-item{
  padding:5px 11px;cursor:pointer;
  display:flex;align-items:center;gap:8px;user-select:none;
  font-size:11px;color:var(--m2);transition:background .1s;
}
.bot-item:hover{background:var(--bg2);color:var(--t)}
.bot-item.sel{background:var(--bg2);color:var(--g)}

/* individual bot dot – green pulsing circle */
.dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
  background:var(--g);box-shadow:0 0 4px var(--g);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ALL BOTS entry */
.all-item{border-bottom:1px solid var(--bd);margin-bottom:3px;padding-bottom:7px}
.all-item:hover{color:var(--y)}
.all-item.sel{color:var(--y)}
.dot.all{
  background:var(--y);box-shadow:0 0 4px var(--y);
  border-radius:2px;animation:none; /* square, static */
}

/* separator line between ALL and bots */
.list-sep{height:1px;background:var(--bd);margin:3px 11px}

#add-pane{
  border-top:1px solid var(--bd);padding:9px;
  display:flex;flex-direction:column;gap:4px;
}

/* ── Right panel ─────────────────────────────────────────── */
#right{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}
#placeholder{
  display:flex;height:100%;align-items:center;
  justify-content:center;color:var(--m);font-size:11px;
}
#ctrl{padding:14px 16px;display:none}

/* context bar at top of controls */
#ctrl-top{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:13px;padding-bottom:8px;border-bottom:1px solid var(--bd);
}
#ctrl-who{font-size:12px;color:var(--g);letter-spacing:.05em}
#ctrl-who.all{color:var(--y)}
#ctrl-sub{font-size:10px;color:var(--m)}

/* dim info section when ALL selected */
#info-sec.dim{opacity:.28;pointer-events:none}

/* ── Sections ───────────────────────────────────────────── */
.blk{margin-bottom:13px}
.blk-hd{
  font-size:10px;color:var(--m2);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:5px;display:flex;align-items:center;gap:8px;
}
.blk-hd::after{content:'';flex:1;height:1px;background:var(--bd)}
.note{font-size:10px;color:var(--m);margin-bottom:4px}

.row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
hr.div{border:none;border-top:1px solid var(--bd);margin:14px 0}

/* ── Info boxes ─────────────────────────────────────────── */
.ibox{
  background:var(--bg2);border:1px solid var(--bd);
  padding:5px 8px;font-size:11px;color:var(--m2);
  min-height:26px;margin-bottom:5px;word-break:break-all;
  display:none;
}
.ibox.vis{display:block}

/* ── Form elements ──────────────────────────────────────── */
input:not([type=checkbox]),input:not([type=file]),select,textarea{
  background:var(--bg2);border:1px solid var(--bd);
  color:var(--t);font-family:var(--font);font-size:11px;
  padding:4px 7px;outline:none;
}
input[type=text],input[type=password],input[type=number]{
  background:var(--bg2);border:1px solid var(--bd);
  color:var(--t);font-family:var(--font);font-size:11px;
  padding:4px 7px;outline:none;
}
input[type=text]:focus,input[type=password]:focus,
input[type=number]:focus,select:focus,textarea:focus{border-color:var(--g)}
input[type=file]{display:none}
textarea{resize:vertical;width:100%}
select{
  cursor:pointer;
  background:var(--bg2);border:1px solid var(--bd);
  color:var(--t);font-family:var(--font);font-size:11px;
  padding:4px 7px;outline:none;
}
select:focus{border-color:var(--g)}
label.ck{
  display:flex;align-items:center;gap:4px;
  cursor:pointer;font-size:11px;color:var(--m2);
}
label.ck input{width:auto}
input[type=number]{width:58px}

/* ── Buttons ────────────────────────────────────────────── */
button{
  font-family:var(--font);font-size:10px;padding:4px 9px;
  border:1px solid var(--bd);background:var(--bg2);color:var(--m2);
  cursor:pointer;letter-spacing:.06em;text-transform:uppercase;
  white-space:nowrap;transition:border-color .1s,color .1s,background .1s;
}
button:hover{border-color:var(--t);color:var(--t)}
button.g{border-color:var(--g);color:var(--g)}
button.g:hover{background:var(--g2)}
button.r{border-color:var(--r);color:var(--r)}
button.r:hover{background:var(--r2)}
button.y{border-color:var(--y);color:var(--y)}
button.y:hover{background:var(--y2)}
button.w{width:100%}
button.sm{font-size:10px;padding:3px 7px}
button.ghost{border:none;background:none;color:var(--m)}
button.ghost:hover{color:var(--m2)}

/* ── Log ────────────────────────────────────────────────── */
#log-wrap{
  height:175px;border-top:1px solid var(--bd);
  display:flex;flex-direction:column;flex-shrink:0;background:var(--bg1);
}
.log-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:3px 12px;border-bottom:1px solid var(--bd);
  font-size:10px;color:var(--m);letter-spacing:.1em;text-transform:uppercase;
}
#log{flex:1;overflow-y:auto;padding:4px 12px;font-size:11px}
.le{color:var(--m);line-height:1.65}
.le.err{color:var(--r)}
.le.ch{color:var(--y)}
.le.sys{color:var(--m2)}
</style>
</head>
<body>

<header>
  <span id="server-name">TULPAR</span>
  <span id="status">connecting…</span>
</header>

<main>

  <!-- ── Bot sidebar ── -->
  <div id="left">
    <div id="bot-list"></div>
    <div id="add-pane">
      <div class="blk-hd" style="margin-bottom:6px">Add Bot</div>
      <input type="text"     id="add-u" placeholder="username" style="width:100%">
      <input type="password" id="add-p" placeholder="password" style="width:100%">
      <button class="g w" onclick="addBot()">+ Add</button>
      <!-- Batch row: paste or load file -->
      <div class="row">
        <button class="sm" style="flex:1" id="batch-tog" onclick="toggleBatch()">Batch…</button>
        <button class="sm" style="flex:1" onclick="document.getElementById('txt-file').click()">Load .txt</button>
      </div>
      <input type="file" id="txt-file" accept=".txt" onchange="handleFileUpload(event)">
      <div id="batch-body" style="display:none;flex-direction:column;gap:4px">
        <textarea id="batch-txt" rows="5" placeholder="user1 pass1&#10;user2 pass2"></textarea>
        <div class="row">
          <button class="g" style="flex:1" onclick="batchAdd(true)">Save + Add</button>
          <button style="flex:1" onclick="batchAdd(false)">Add Only</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div id="right">
    <div id="placeholder">← select a bot</div>
    <div id="ctrl">

      <!-- Context bar -->
      <div id="ctrl-top">
        <span id="ctrl-who"></span>
        <span id="ctrl-sub"></span>
      </div>

      <!-- Info (disabled in ALL mode) -->
      <div class="blk" id="info-sec">
        <div class="blk-hd">Info</div>
        <div id="ipos" class="ibox">—</div>
        <div id="iinv" class="ibox" style="max-height:72px;overflow-y:auto"></div>
        <div class="row">
          <button onclick="fetchPos()">Position</button>
          <button onclick="fetchInv()">Inventory</button>
        </div>
      </div>

      <!-- Chat -->
      <div class="blk">
        <div class="blk-hd">Chat</div>
        <div class="row">
          <input type="text" id="chat-msg" placeholder="/command or message…" style="flex:1">
          <button onclick="sendChat(false)">Send</button>
          <button onclick="sendChat(true)">All</button>
        </div>
      </div>

      <!-- Hotbar -->
      <div class="blk">
        <div class="blk-hd">Hotbar</div>
        <div class="row">
          <select id="hb-slot">
            <option value="0">Slot 1</option><option value="1">Slot 2</option>
            <option value="2">Slot 3</option><option value="3">Slot 4</option>
            <option value="4">Slot 5</option><option value="5">Slot 6</option>
            <option value="6">Slot 7</option><option value="7">Slot 8</option>
            <option value="8">Slot 9</option>
          </select>
          <button onclick="setHotbar()">Set</button>
        </div>
      </div>

      <!-- Items -->
      <div class="blk">
        <div class="blk-hd">Items</div>
        <div class="row">
          <button class="r" onclick="dropAll()">Drop All</button>
        </div>
      </div>

      <hr class="div">

      <!-- Attack -->
      <div class="blk">
        <div class="blk-hd">Attack</div>
        <div class="row">
          <input type="number" id="atk-delay" value="0.5" step="0.1" min="0.1">
          <span style="color:var(--m);font-size:10px">s / swing</span>
          <button class="g" onclick="attackAct('start')">Start</button>
          <button class="r" onclick="attackAct('stop')">Stop</button>
        </div>
      </div>

      <!-- Honey Bottle -->
      <div class="blk">
        <div class="blk-hd">Honey Bottle <span style="color:var(--m);font-size:10px;letter-spacing:0;text-transform:none">&thinsp;39 min loop</span></div>
        <div class="row">
          <button class="g" onclick="potionAct('start')">Start</button>
          <button class="r" onclick="potionAct('stop')">Stop</button>
        </div>
      </div>

      <!-- Koth Notify -->
      <div class="blk">
        <div class="blk-hd">Koth Notify <span style="color:var(--m);font-size:10px;letter-spacing:0;text-transform:none">&thinsp;phone + discord on player nearby</span></div>
        <div class="row">
          <button class="g" onclick="notifyAct('start')">Start</button>
          <button class="r" onclick="notifyAct('stop')">Stop</button>
        </div>
      </div>

      <!-- Sell + Drop -->
      <div class="blk">
        <div class="blk-hd">Sell + Drop Loop</div>
        <div class="row">
          <button class="g" onclick="sdAct('start')">Start</button>
          <button class="r" onclick="sdAct('stop')">Stop</button>
        </div>
      </div>

      <!-- Sequence -->
      <div class="blk">
        <div class="blk-hd">Chat Sequence</div>
        <div class="note">message|delay_secs &nbsp;·&nbsp; one per line</div>
        <textarea id="seq-msg" rows="5" placeholder="/sellall PRISMARINE_CRYSTALS|10&#10;/sellall PRISMARINE_SHARD|10&#10;/home|5"></textarea>
        <div class="row" style="margin-top:5px">
          <input type="number" id="seq-init" value="0" min="0" title="initial delay (s)">
          <span style="color:var(--m);font-size:10px">s init</span>
          <label class="ck"><input type="checkbox" id="seq-loop"> loop</label>
          <button class="g" onclick="seqAct('start')">Start</button>
          <button class="r" onclick="seqAct('stop')">Stop</button>
        </div>
      </div>

      <hr class="div">

      <!-- Global -->
      <div class="blk">
        <div class="blk-hd">Global</div>
        <button onclick="warpArena()">Warp Arena (All Bots)</button>
      </div>

      <hr class="div">

      <div class="blk">
        <button id="disc-btn" class="r w" onclick="disconnectBot()">Disconnect Bot</button>
      </div>

    </div><!-- /ctrl -->
  </div>

</main>

<!-- ── Log ── -->
<div id="log-wrap">
  <div class="log-bar">
    <span>Log</span>
    <button class="ghost sm" onclick="clearLog()">Clear</button>
  </div>
  <div id="log"></div>
</div>

<script>
let sel     = null;   // selected bot username, or '__all__'
let allBots = [];     // live list from /api/bots

// ── SSE ──────────────────────────────────────────────────────────
const es = new EventSource('/api/stream');
es.onmessage = e => {
  const msg = e.data;
  const d   = document.createElement('div');
  d.className = 'le'
    + (msg.includes('[ERR]')                                 ? ' err' : '')
    + (msg.includes('[CHAT]') || msg.includes('[WHISPER]')   ? ' ch'  : '')
    + (msg.includes('[SYS]')                                 ? ' sys' : '');
  d.textContent = msg;
  const log = document.getElementById('log');
  const atBot = log.scrollHeight - log.clientHeight <= log.scrollTop + 24;
  log.appendChild(d);
  if (atBot) log.scrollTop = log.scrollHeight;
};

// ── Config ────────────────────────────────────────────────────────
fetch('/api/config').then(r => r.json()).then(d => {
  document.getElementById('server-name').textContent = d.name;
  document.title = d.name;
});

// ── Bot list ──────────────────────────────────────────────────────
async function refreshBots() {
  try {
    const bots = await fetch('/api/bots').then(r => r.json());
    allBots = bots;
    document.getElementById('status').textContent =
      bots.length ? `${bots.length} online` : 'no bots';

    // keep ctrl-sub count fresh when in ALL mode
    if (sel === '__all__') {
      document.getElementById('ctrl-sub').textContent =
        `${bots.length} bot${bots.length !== 1 ? 's' : ''}`;
    }

    const list = document.getElementById('bot-list');
    list.innerHTML = '';

    // ── ALL BOTS entry (shown only when there are bots) ──
    if (bots.length > 0) {
      const allEl = document.createElement('div');
      allEl.className = 'bot-item all-item' + (sel === '__all__' ? ' sel' : '');
      allEl.innerHTML = `<div class="dot all"></div>ALL BOTS`;
      allEl.onclick = () => selectBot('__all__');
      list.appendChild(allEl);

      const sep = document.createElement('div');
      sep.className = 'list-sep';
      list.appendChild(sep);
    }

    // ── Individual bots ──
    bots.forEach(name => {
      const d = document.createElement('div');
      const isSel = sel && sel !== '__all__' && name.toLowerCase() === sel.toLowerCase();
      d.className = 'bot-item' + (isSel ? ' sel' : '');
      d.innerHTML = `<div class="dot"></div>${name}`;
      d.onclick = () => selectBot(name);
      list.appendChild(d);
    });
  } catch (_) {}
}
setInterval(refreshBots, 3000);
refreshBots();

// ── Select a bot (or ALL) ─────────────────────────────────────────
function selectBot(name) {
  sel = name;
  document.getElementById('placeholder').style.display  = 'none';
  document.getElementById('ctrl').style.display         = 'block';

  const who = document.getElementById('ctrl-who');
  const sub = document.getElementById('ctrl-sub');
  const infoSec = document.getElementById('info-sec');

  if (name === '__all__') {
    who.textContent = 'ALL BOTS';
    who.className   = 'all';
    sub.textContent = `${allBots.length} bot${allBots.length !== 1 ? 's' : ''}`;
    infoSec.classList.add('dim');
    document.getElementById('disc-btn').textContent = 'DISCONNECT ALL';
    document.getElementById('disc-btn').className   = 'y w';
  } else {
    who.textContent = name;
    who.className   = '';
    sub.textContent = '';
    infoSec.classList.remove('dim');
    document.getElementById('disc-btn').textContent = 'DISCONNECT BOT';
    document.getElementById('disc-btn').className   = 'r w';
  }

  // reset info boxes
  document.getElementById('ipos').className = 'ibox';
  document.getElementById('iinv').className = 'ibox';

  refreshBots();
}

// ── Target helper ─────────────────────────────────────────────────
// Returns array of bot usernames to operate on.
function getTargets() {
  if (sel === '__all__') return [...allBots];
  return sel ? [sel] : [];
}

// ── API helper ────────────────────────────────────────────────────
async function post(path, body = {}) {
  try {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch (e) { return { status: 'error', message: e.message }; }
}

// ── Add bot (single) ──────────────────────────────────────────────
async function addBot() {
  const u = document.getElementById('add-u').value.trim();
  const p = document.getElementById('add-p').value.trim();
  if (!u || !p) return;
  await post('/api/bots/add', { username: u, password: p });
  document.getElementById('add-u').value = '';
  document.getElementById('add-p').value = '';
  setTimeout(refreshBots, 1200);
}
document.getElementById('add-p').addEventListener('keydown', e => {
  if (e.key === 'Enter') addBot();
});

// ── Batch via paste ───────────────────────────────────────────────
function toggleBatch() {
  const p    = document.getElementById('batch-body');
  const open = p.style.display === 'flex';
  p.style.display = open ? 'none' : 'flex';
  document.getElementById('batch-tog').textContent = open ? 'Batch…' : 'Batch ▲';
}

async function batchAdd(save) {
  const lines = document.getElementById('batch-txt').value.trim().split('\n').filter(Boolean);
  const accounts = lines.map(l => {
    const [username, password] = l.trim().split(/\s+/);
    return { username, password };
  }).filter(a => a.username && a.password);
  if (!accounts.length) return;
  await post('/api/bots/batch-add', { accounts, save });
  setTimeout(refreshBots, 1500);
}

// ── Batch via .txt file ───────────────────────────────────────────
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result
      .split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('#'));
    const accounts = lines.map(l => {
      const [username, password] = l.split(/\s+/);
      return { username, password };
    }).filter(a => a.username && a.password);
    if (!accounts.length) return;
    await post('/api/bots/batch-add', { accounts, save: false });
    setTimeout(refreshBots, 1500);
  };
  reader.readAsText(file);
  event.target.value = ''; // allow re-uploading same file
}

// ── Info (single-bot only) ────────────────────────────────────────
async function fetchPos() {
  if (!sel || sel === '__all__') return;
  const el = document.getElementById('ipos');
  el.className = 'ibox vis';
  const d = await fetch(`/api/bots/${sel}/position`).then(r => r.json()).catch(() => null);
  if (!d || d.error) { el.textContent = d?.error || 'error'; return; }
  el.innerHTML =
    `<span style="color:var(--t)">${d.x}, ${d.y}, ${d.z}</span>` +
    `<span style="color:var(--m)"> [${d.dimension}]</span>`;
}

async function fetchInv() {
  if (!sel || sel === '__all__') return;
  const el = document.getElementById('iinv');
  el.className = 'ibox vis';
  const items = await fetch(`/api/bots/${sel}/inventory`).then(r => r.json()).catch(() => []);
  if (!items.length) { el.textContent = 'empty'; return; }
  el.innerHTML = items.map(i =>
    `<span style="color:var(--t)">${i.count}×</span><span style="color:var(--m2)"> ${i.name}</span>`
  ).join('  ');
}

// ── Chat ──────────────────────────────────────────────────────────
async function sendChat(all) {
  const msg = document.getElementById('chat-msg').value.trim();
  if (!msg) return;
  // force broadcast when in ALL mode
  const toAll = all || sel === '__all__';
  if (!toAll && !sel) return;
  await post('/api/bots/chat', { target: toAll ? 'all' : sel, message: msg });
  document.getElementById('chat-msg').value = '';
}
document.getElementById('chat-msg').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat(false);
});

// ── Hotbar ────────────────────────────────────────────────────────
async function setHotbar() {
  const targets = getTargets();
  if (!targets.length) return;
  const slot = parseInt(document.getElementById('hb-slot').value);
  await Promise.all(targets.map(t => post('/api/bots/hotbar', { username: t, slot })));
}

// ── Drop ──────────────────────────────────────────────────────────
async function dropAll() {
  const targets = getTargets();
  if (!targets.length) return;
  await Promise.all(targets.map(t => post('/api/bots/drop', { username: t })));
}

// ── Warp Arena ────────────────────────────────────────────────────
async function warpArena() {
  await post('/api/bots/warp-arena');
}

// ── Attack ────────────────────────────────────────────────────────
async function attackAct(action) {
  const targets = getTargets();
  if (!targets.length) return;
  const delay = parseFloat(document.getElementById('atk-delay').value) || 0.5;
  await Promise.all(targets.map(t => post(`/api/bots/attack/${action}`, { username: t, delay })));
}

// ── Honey Bottle ──────────────────────────────────────────────────
async function potionAct(action) {
  const targets = getTargets();
  if (!targets.length) return;
  await Promise.all(targets.map(t => post(`/api/bots/potion/${action}`, { username: t })));
}

// ── Koth Notify ───────────────────────────────────────────────────
async function notifyAct(action) {
  const targets = getTargets();
  if (!targets.length) return;
  await Promise.all(targets.map(t => post(`/api/bots/notify/${action}`, { username: t })));
}

// ── Sell + Drop ───────────────────────────────────────────────────
async function sdAct(action) {
  const targets = getTargets();
  if (!targets.length) return;
  await Promise.all(targets.map(t => post(`/api/bots/selldrop/${action}`, { username: t })));
}

// ── Sequence ──────────────────────────────────────────────────────
async function seqAct(action) {
  const targets = getTargets();
  if (!targets.length) return;
  if (action === 'start') {
    const lines = document.getElementById('seq-msg').value.trim().split('\n').filter(Boolean);
    const messages = lines.map(l => {
      const i = l.lastIndexOf('|');
      if (i < 0) return { text: l.trim(), delay: 5 };
      return { text: l.slice(0, i).trim(), delay: parseFloat(l.slice(i + 1)) || 5 };
    });
    if (!messages.length) return;
    const initialDelay = parseFloat(document.getElementById('seq-init').value) || 0;
    const loop = document.getElementById('seq-loop').checked;
    await Promise.all(targets.map(t => post('/api/bots/sequence/start', {
      username: t, messages, initialDelay, loop
    })));
  } else {
    await Promise.all(targets.map(t => post('/api/bots/sequence/stop', { username: t })));
  }
}

// ── Disconnect ────────────────────────────────────────────────────
async function disconnectBot() {
  const targets = getTargets();
  if (!targets.length) return;
  await Promise.all(targets.map(t => post('/api/bots/disconnect', { username: t })));
  sel = null;
  document.getElementById('placeholder').style.display = '';
  document.getElementById('ctrl').style.display = 'none';
  setTimeout(refreshBots, 800);
}

// ── Log ───────────────────────────────────────────────────────────
function clearLog() {
  document.getElementById('log').innerHTML = '';
}
</script>
